name: Build PocketBook App

on:
  workflow_dispatch:
    inputs:
      toolchain_relative:
        description: Optional path inside the SDK archive to the PocketBook CMake toolchain file
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build ReadingStats.app
    runs-on: ubuntu-latest
    env:
      DEFAULT_POCKETBOOK_SDK_URL: https://github.com/pocketbook/SDK_6.3.0/releases/download/6.8/SDK-B300-6.8.7z
      POCKETBOOK_SDK_URL: ${{ secrets.POCKETBOOK_SDK_URL }}
      TOOLCHAIN_RELATIVE: ${{ inputs.toolchain_relative }}

    steps:
      - name: Checkout product-v2
        uses: actions/checkout@v4
        with:
          ref: product-v2

      - name: Prepare paths and SDK URL
        run: |
          echo "SDK_DIR=$RUNNER_TEMP/pocketbook-sdk" >> "$GITHUB_ENV"
          echo "SDK_ARCHIVE=$RUNNER_TEMP/pocketbook-sdk.7z" >> "$GITHUB_ENV"
          if [ -n "$POCKETBOOK_SDK_URL" ]; then
            echo "SDK_URL=$POCKETBOOK_SDK_URL" >> "$GITHUB_ENV"
          else
            echo "SDK_URL=$DEFAULT_POCKETBOOK_SDK_URL" >> "$GITHUB_ENV"
          fi

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential unzip file
          if ! command -v 7z >/dev/null 2>&1; then
            sudo apt-get install -y p7zip-full || sudo apt-get install -y 7zip || sudo apt-get install -y p7zip
          fi
          7z || true

      - name: Download PocketBook SDK
        run: |
          echo "Downloading PocketBook SDK..."
          echo "SDK URL host: $(printf '%s' "$SDK_URL" | sed -E 's#^https?://([^/]+)/.*#\1#')"
          curl -L --fail-with-body --show-error --retry 3 "$SDK_URL" -o "$SDK_ARCHIVE"
          echo "Downloaded SDK archive candidate:"
          file "$SDK_ARCHIVE"
          ls -lh "$SDK_ARCHIVE"

      - name: Unpack PocketBook SDK
        run: |
          mkdir -p "$SDK_DIR"
          echo "Archive type:"
          file "$SDK_ARCHIVE"

          if 7z t "$SDK_ARCHIVE" >/dev/null 2>&1; then
            set +e
            7z x "$SDK_ARCHIVE" -o"$SDK_DIR" -y
            SEVEN_Z_STATUS="$?"
            set -e
            if [ "$SEVEN_Z_STATUS" -ne 0 ]; then
              echo "7z exited with status $SEVEN_Z_STATUS. PocketBook SDK archives contain symlinks that 7z may report as dangerous on GitHub runners. Continuing if core SDK files were extracted."
            fi
          elif unzip -tq "$SDK_ARCHIVE" >/dev/null 2>&1; then
            unzip -q "$SDK_ARCHIVE" -d "$SDK_DIR"
          elif tar -tf "$SDK_ARCHIVE" >/dev/null 2>&1; then
            tar -xf "$SDK_ARCHIVE" -C "$SDK_DIR"
          else
            echo "::error::Downloaded SDK is not a valid 7z/ZIP/TAR archive."
            exit 1
          fi

          if ! find "$SDK_DIR" -type f -name "inkview.h" | grep -q .; then
            echo "::error::SDK extraction did not produce inkview.h."
            exit 1
          fi

      - name: Locate PocketBook toolchain
        run: |
          if [ -n "$TOOLCHAIN_RELATIVE" ]; then
            TOOLCHAIN="$SDK_DIR/$TOOLCHAIN_RELATIVE"
            if [ ! -f "$TOOLCHAIN" ]; then
              echo "::error::toolchain_relative was provided but does not point to a file: $TOOLCHAIN_RELATIVE"
              exit 1
            fi
          else
            SDK_ROOT="$(find "$SDK_DIR" -maxdepth 2 -type d -name 'SDK-B300-*' | head -n 1)"
            if [ -z "$SDK_ROOT" ]; then
              SDK_ROOT="$SDK_DIR"
            fi
            SYSROOT="$(find "$SDK_ROOT" -type d -path '*/arm-obreey-linux-gnueabi/sysroot' | head -n 1)"
            CXX="$(find "$SDK_ROOT" \( -type f -o -type l \) -name 'arm-obreey-linux-gnueabi-g++' | head -n 1)"
            CC="$(find "$SDK_ROOT" \( -type f -o -type l \) -name 'arm-obreey-linux-gnueabi-gcc' | head -n 1)"
            if [ -z "$SYSROOT" ] || [ -z "$CXX" ] || [ -z "$CC" ]; then
              echo "::error::Could not locate SDK sysroot/compiler."
              exit 1
            fi

            chmod +x "$CC" "$CXX" || true

            echo "Installing PocketBook compiler runtime libraries into /usr/local/lib"
            for LIBPATTERN in 'libmpfr.so*' 'libgmp.so*' 'libmpc.so*' 'libisl.so*'; do
              LIBFILE="$(find "$SDK_ROOT" \( -type f -o -type l \) -name "$LIBPATTERN" | head -n 1)"
              if [ -n "$LIBFILE" ]; then
                echo "Installing runtime library: $LIBFILE"
                sudo cp -L "$LIBFILE" /usr/local/lib/
              fi
            done
            sudo ldconfig

            TOOLCHAIN="$RUNNER_TEMP/ci-pocketbook-toolchain.cmake"
            cat > "$TOOLCHAIN" <<EOF
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)
          set(CMAKE_SYSROOT "$SYSROOT")
          set(CMAKE_C_COMPILER "$CC")
          set(CMAKE_CXX_COMPILER "$CXX")
          set(CMAKE_FIND_ROOT_PATH "$SYSROOT")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          set(CMAKE_C_FLAGS "--sysroot=$SYSROOT -I$SYSROOT/usr/include -I$SYSROOT/usr/local/include" CACHE STRING "" FORCE)
          set(CMAKE_CXX_FLAGS "--sysroot=$SYSROOT -I$SYSROOT/usr/include -I$SYSROOT/usr/local/include -DKEY_NEXT2=KEY_NEXT -DKEY_PREV=KEY_LEFT -DKEY_PREV2=KEY_LEFT" CACHE STRING "" FORCE)
          set(CMAKE_EXE_LINKER_FLAGS "--sysroot=$SYSROOT -static-libstdc++ -static-libgcc" CACHE STRING "" FORCE)
          EOF
          fi

          echo "Using toolchain: $TOOLCHAIN"
          echo "POCKETBOOK_TOOLCHAIN=$TOOLCHAIN" >> "$GITHUB_ENV"
          sed -n '1,160p' "$TOOLCHAIN"

      - name: Build package
        run: |
          set -x
          echo "POCKETBOOK_TOOLCHAIN=$POCKETBOOK_TOOLCHAIN"
          bash -x scripts/build.sh || {
            STATUS="$?"
            echo "::error::Build package failed with exit code $STATUS"
            find build -type f \( -name CMakeError.log -o -name CMakeOutput.log \) -print -exec sed -n '1,220p' {} \; || true
            exit "$STATUS"
          }

      - name: Upload ReadingStats package
        uses: actions/upload-artifact@v4
        with:
          name: reading-stats-pocketbook
          path: |
            dist/*.app
            dist/*.bmp
            docs/install-pocketbook.txt
          if-no-files-found: error
